backend:
  name: git-gateway
  branch: main

site_url: https://bruno-teixeira-adv-site.netlify.app
display_url: https://bruno-teixeira-adv-site.netlify.app

media_folder: imagens
public_folder: /imagens

locale: pt

collections:
  - name: configuracoes
    label: "Configurações do Site"
    files:
      - label: "Foto, Logo e Dados"
        name: perfil
        file: "_config/perfil.json"
        fields:
          - label: "Logomarca (navbar)"
            name: logo
            widget: image
            required: false
            hint: "PNG com fundo transparente. Aparece no menu do site."

          - label: "Favicon (ícone da aba do navegador)"
            name: favicon
            widget: image
            required: false
            hint: "PNG quadrado 64x64px. Aparece na aba do navegador."

          - label: "Foto Principal (Seção Sobre)"
            name: foto_sobre
            widget: image
            required: false
            hint: "Foto que aparece na seção Sobre o Advogado"

          - label: "Nome completo"
            name: nome
            widget: string
            default: "Bruno Teixeira"

          - label: "OAB"
            name: oab
            widget: string
            default: "OAB/BA Nº 71.020"

          - label: "Telefone / WhatsApp"
            name: telefone
            widget: string
            hint: "Formato: 5587999999999 (com código do país, sem espaços)"

          - label: "Endereço"
            name: endereco
            widget: string

          - label: "E-mail"
            name: email
            widget: string

          - label: "Instagram principal"
            name: instagram
            widget: string
            hint: "Só o @usuario, ex: brunoteixeiras.adv"

  - name: artigos
    label: Artigos
    label_singular: Artigo
    folder: artigos
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - label: Título
        name: title
        widget: string

      - label: Data de Publicação
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "DD/MM/YYYY"
        time_format: false

      - label: Resumo
        name: resumo
        widget: text

      - label: Categoria
        name: categoria
        widget: select
        options:
          - { label: "Direito Trabalhista", value: "trabalhista" }
          - { label: "Direito Cível", value: "civel" }
          - { label: "Direito Previdenciário", value: "previdenciario" }
          - { label: "Direito Criminal", value: "criminal" }
          - { label: "Dicas Jurídicas", value: "dicas" }
        default: "trabalhista"

      - label: Imagem de Capa
        name: capa
        widget: image
        required: false
        hint: "Opcional — foto de capa para o artigo (JPG ou PNG)"

      - label: Conteúdo
        name: body
        widget: markdown
        hint: "Escreva o conteúdo completo do artigo aqui"